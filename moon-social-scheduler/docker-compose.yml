# Docker Compose para desarrollo local sin Redis
# Para producción usa Supabase + Edge Functions (ver SUPABASE_SETUP.md)

services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: moon_social_scheduler
      POSTGRES_USER: moon
      POSTGRES_PASSWORD: moon
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U moon -d moon_social_scheduler"]
      interval: 5s
      timeout: 5s
      retries: 20

  app:
    build: .
    environment:
      APP_URL: http://localhost:3000
      NEXTAUTH_URL: http://localhost:3000
      NEXTAUTH_SECRET: replace-with-a-long-random-secret
      DATABASE_URL: postgresql://moon:moon@postgres:5432/moon_social_scheduler?schema=public
      DEV_USER_EMAIL: owner@moon.local
      DEV_USER_NAME: MoOn Owner
      DEV_WORKSPACE_SLUG: moon
      DEV_WORKSPACE_NAME=MoOn Workspace
      INSTAGRAM_APP_ID: ${INSTAGRAM_APP_ID:-}
      INSTAGRAM_APP_SECRET: ${INSTAGRAM_APP_SECRET:-}
      TIKTOK_CLIENT_KEY: ${TIKTOK_CLIENT_KEY:-}
      TIKTOK_CLIENT_SECRET: ${TIKTOK_CLIENT_SECRET:-}
    ports:
      - "3000:3000"
    depends_on:
      postgres:
        condition: service_healthy
    command: sh -c "npx prisma migrate deploy && node server.js"

volumes:
  postgres-data:
